name: Web PR Preview

on:
  pull_request:
    branches: [main]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'pubspec.yaml'
      - '.github/workflows/web-pr-preview.yml'

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build web app (production mode)
        run: |
          flutter build web \
            --release \
            --base-href "/essentiel_app/pr-${{ github.event.pull_request.number }}/" \
            --pwa-strategy offline-first \
            --tree-shake-icons \
            -t lib/environments/web_prod.dart

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build-pr-${{ github.event.pull_request.number }}
          path: build/web/
          retention-days: 7

      - name: Comment PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const comment = `## 🌐 Web Preview Build Ready

            **PR #${prNumber}** web build completed successfully!

            ### 📦 Build Artifacts
            The web build is available as a workflow artifact (retention: 7 days).

            ### 🧪 Local Testing
            To test this PR locally:

            1. **Download the artifact** from the workflow run
            2. **Extract** the build files
            3. **Serve locally**:
               \`\`\`bash
               cd build/web
               python3 -m http.server 8000
               \`\`\`
            4. **Open**: http://localhost:8000

            ### 🔗 Backend Configuration
            This build expects the backend API at:
            - **Production**: \`https://api.essentiel.app\`

            ⚠️ **Note**: Backend must be deployed before this preview will work properly.

            ### 📋 Test Checklist
            - [ ] Cards load from backend API
            - [ ] Shuffle functionality works
            - [ ] Category filters work
            - [ ] localStorage persists settings
            - [ ] Offline mode shows cached cards
            - [ ] PWA installation works

            ### 🚀 Deploy Options
            For automatic preview deployments, consider:
            - **Netlify**: Drop Zone or GitHub integration
            - **Vercel**: GitHub integration with automatic previews
            - **Cloudflare Pages**: GitHub integration

            ---
            🤖 Built with commit ${context.sha.substring(0, 7)}
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'Web Preview Build',
              description: 'Preview build completed - check artifacts'
            });
