# Fly.io deployment configuration
app = "essentiel-backend-api"
primary_region = "cdg"  # Paris region

[build]
  dockerfile = "deployments/Dockerfile"

[env]
  PORT = "8080"
  ALLOWED_ORIGIN = "https://lemra-org.github.io"
  CACHE_TTL_MINUTES = "5"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    grace_period = "5s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
