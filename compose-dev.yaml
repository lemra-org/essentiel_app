# Development Docker Compose - builds images from local source
# Usage: docker compose -f compose-dev.yaml up --build

services:
  # Redis cache for backend
  redis:
    image: redis:7-alpine
    command: redis-server --loglevel verbose
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - essentiel-network

  # Backend API (Go) - builds from local source
  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    image: essentiel-backend-api:dev
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON}
      - GOOGLE_SPREADSHEET_ID=${GOOGLE_SPREADSHEET_ID}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:3000}
      - CACHE_TTL_MINUTES=${CACHE_TTL_MINUTES:-5}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - essentiel-network

  # Frontend (Flutter web) - builds from local source
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: ${BUILD_ENV:-dev}
    image: essentiel-frontend:dev
    ports:
      - "3000:80"
    environment:
      - BACKEND_API_URL=${BACKEND_API_URL:-http://backend-api:8080}
    restart: unless-stopped
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - essentiel-network

networks:
  essentiel-network:
    driver: bridge
