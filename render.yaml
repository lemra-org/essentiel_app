# Render Blueprint - Full Stack Deployment
# Deploys both frontend (Flutter web) and backend (Go API)
#
# Note: Redis is optional. Backend falls back to in-memory cache if REDIS_ADDR is empty.
# To add Redis: Create a Redis instance in Render dashboard, then update REDIS_ADDR manually.

services:
  # Backend API (Go)
  - type: web
    name: essentiel-backend-api
    runtime: docker
    dockerfilePath: ./backend-api/Dockerfile
    dockerContext: ./backend-api
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: 8080
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false  # Set in Render dashboard (secret)
      - key: GOOGLE_SPREADSHEET_ID
        sync: false  # Set in Render dashboard (secret)
      - key: ALLOWED_ORIGIN
        value: "*"  # Set to specific frontend URL after deployment
      - key: CACHE_TTL_MINUTES
        value: 5
      - key: REDIS_ADDR
        value: ""  # Leave empty to disable Redis, or add Render Redis URL manually

  # Frontend (Flutter Web)
  - type: web
    name: essentiel-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: BUILD_ENV
        value: prod
      - key: BACKEND_URL
        fromService:
          type: web
          name: essentiel-backend-api
          envVarKey: RENDER_INTERNAL_URL
